<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anno 117 Mod Manager</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/parchment.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/tabs/activation.css" />
  <link rel="stylesheet" href="css/tabs/settings.css" />
  <link rel="stylesheet" href="css/tabs/log.css" />
  <link rel="stylesheet" href="css/tabs/install.css" />
  <!-- Load order matters: app.js must define annoApp() *before* alpine.min.js
       calls Alpine.start() on DOMContentLoaded, otherwise x-data="annoApp()"
       resolves to undefined and the whole tree silently fails to render. -->
  <script defer src="js/app.js"></script>
  <script defer src="vendor/alpine.min.js"></script>
</head>
<body x-data="annoApp()" x-init="init()">

  <header class="title-bar">
    <h1 class="title-bar__brand">
      <span class="title-bar__roman">ANNO 117</span>
      <span class="title-bar__sub">Mod Manager</span>
    </h1>
    <span class="title-bar__version" x-text="version ? 'v' + version : ''"></span>

    <!-- Round flag button + popover for the language picker. -->
    <div class="lang-picker" @click.outside="langOpen = false">
      <button class="lang-picker__btn"
              @click="langOpen = !langOpen"
              :title="currentLanguage ? currentLanguage.name : 'Langue'">
        <span class="lang-picker__flag" x-text="currentLanguage ? currentLanguage.flag : '🌐'"></span>
      </button>
      <div class="lang-picker__menu" x-show="langOpen" x-cloak>
        <template x-for="l in languages" :key="l.key">
          <button class="lang-picker__item"
                  :class="{ 'is-active': l.key === currentLang }"
                  @click="selectLanguage(l.key)">
            <span class="lang-picker__item-flag" x-text="l.flag"></span>
            <span class="lang-picker__item-name" x-text="l.name"></span>
          </button>
        </template>
      </div>
    </div>
  </header>

  <div class="layout">

    <main class="main">
      <!-- Single dispatcher: each render*() returns the HTML string for the
           active tab. Sits directly on the .main > div so it inherits
           flex:1 + overflow:hidden — without that, height:100% inside the
           tab has no reference and content spills under the HUD bar. -->
      <div x-html="renderTab(currentTab)"></div>
    </main>

    <footer class="toolbar">
      <!-- Single composite HUD pill with two internal rows. The visual seam
           between the rows is just a thin inset rule so the whole assembly
           reads as one carved frame, like the in-game build menu. -->
      <div class="toolbar__hud">

        <!-- Row 1 — main tabs (rounded square buttons) -->
        <div class="toolbar__hud-row toolbar__hud-row--top">
          <div class="toolbar__group">
            <template x-for="tab in tabs.filter(x => x.group === 'mods')" :key="tab.id">
              <button
                class="toolbar__tab"
                :class="{ 'is-active': currentTab === tab.id, 'is-disabled': tab.disabled }"
                :title="tab.label"
                @click="!tab.disabled && (currentTab = tab.id)">
                <img class="toolbar__icon" :src="tab.img" :alt="tab.label" />
              </button>
            </template>
          </div>
          <div class="toolbar__divider"></div>
          <div class="toolbar__group">
            <template x-for="tab in tabs.filter(x => x.group === 'tools')" :key="tab.id">
              <button
                class="toolbar__tab"
                :class="{ 'is-active': currentTab === tab.id, 'is-disabled': tab.disabled }"
                :title="tab.label"
                @click="!tab.disabled && (currentTab = tab.id)">
                <img class="toolbar__icon" :src="tab.img" :alt="tab.label" />
              </button>
            </template>
          </div>
        </div>

        <!-- Row 2 — utility buttons + global search. Settings + refresh sit at
             the bottom-left (mirroring annolayouts' gear/menu placement),
             search in the middle, launch at the bottom-right. -->
        <div class="toolbar__hud-row toolbar__hud-row--bottom">
          <div class="toolbar__group toolbar__group--utility">
            <div class="toolbar__cup">
              <button class="toolbar__round"
                      @click="currentTab = 'settings'"
                      title="Paramètres">
                <img class="toolbar__round-icon" src="icons/settings.png" alt="Paramètres" />
              </button>
            </div>
            <!-- Refresh only makes sense when there's a mod list visible -->
            <div class="toolbar__cup" x-show="currentTab === 'activation'">
              <button class="toolbar__round"
                      @click="refreshMods()"
                      title="Rafraîchir la liste des mods">
                <img class="toolbar__round-icon" src="icons/refresh.png" alt="Rafraîchir" />
              </button>
            </div>
          </div>

          <!-- Search filters the activation list, hide it elsewhere -->
          <div class="toolbar__search" x-show="currentTab === 'activation'">
            <svg class="toolbar__search-icon" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7" />
              <path d="M20 20l-4-4" />
            </svg>
            <input class="toolbar__search-input"
                   type="text"
                   placeholder="Rechercher un mod…"
                   x-model="search" />
          </div>
          <!-- Spacer to keep the launch button anchored right when the search is hidden -->
          <div class="toolbar__bottom-spacer" x-show="currentTab !== 'activation'"></div>

          <div class="toolbar__group toolbar__group--utility">
            <div class="toolbar__cup">
              <button class="toolbar__round"
                      @click="openModsFolder()"
                      :title="t('mods.openFolder.title')">
                <img class="toolbar__round-icon" src="icons/folder.png" :alt="t('mods.openFolder.title')" />
              </button>
            </div>
            <div class="toolbar__cup">
              <button class="toolbar__round toolbar__round--launch"
                      @click="launchGame()"
                      :title="t('launch.title')">
                <img class="toolbar__round-icon" src="icons/launch.png" :alt="t('launch.title')" />
              </button>
            </div>
          </div>
        </div>

      </div>
    </footer>

  </div>

</body>
</html>
