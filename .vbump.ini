[current_version]
major = 1
minor = 3
patch = 0
devnumber = 0

[syntax]
write_dev = {major}.{minor}.{patch}.{devnumber}
write_prod = {major}.{minor}.{patch}.{devnumber}
read_regex = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)\.(?P<devnumber>\d+)

[bump]
reset_order = major, minor, patch, devnumber
auto = devnumber

[write]
files = _version.py
